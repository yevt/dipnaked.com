<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DPH9J06BMZ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DPH9J06BMZ');
    </script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #131313;
        }
        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 100vw;

        }
        section {
            padding: 0 20px 0 20px;
        }
        a {
            text-decoration: none;
            color: #B4B5B2;
            font-size: 18px;
            position: relative;
            display: inline-block;
            transition: all 0.3s ease;
        }
        img {
            width: 150px;
        }
        h2 {
            color: #B4B5B2;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: extra-bold;
        }
        .streaming-logos {
            gap: 12px;
            /* flex-wrap: nowrap; */
            align-items: center;
            /* overflow-x: auto; */
            /* overflow-y: hidden; */
            /* -webkit-overflow-scrolling: touch; */
            /* padding: 0 20px 8px 20px; */
            /* box-sizing: border-box; */
            /* width: 100%; */
            /* max-width: 288px; */
            max-width: 100%;
            
        }
        /* .streaming-logos::-webkit-scrollbar {
            display: none;
        } */
        /* .streaming-logos {
            scrollbar-width: none;
            -ms-overflow-style: none;
        } */
        .streaming-logos a {
            display: inline-flex;
            /* align-items: center; */
            gap: 6px;
            padding: 0 20px 20px 0;
            /* height: 28px; */
            /* flex-shrink: 0; */
        }
        .streaming-logos img {
            height: 28px;
            width: auto;
            display: block;
        }
        

        .lang-toggle {
            position: fixed;
            top: 16px;
            right: 20px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }
        .lang-toggle button {
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            color: #434342;
            padding: 2px 4px;
            transition: color 0.2s ease;
        }
        .lang-toggle button.active {
            color: #B4B5B2;
        }
        .lang-toggle button:hover {
            color: #B4B5B2;
        }
        .section-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
        }
        .section-links a {
            padding: 0 20px 20px 0;
        }
        .section-links span {
            font-size: 14px;
            display: block;
            line-height: 28px;
            position: relative;
        }
        .section-links span::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0.05em;
            background-color: rgba(0, 191, 166, 0.95);
            transition: all 0.3s ease;
        }
        .section-links a:hover span::after {
            width: calc(100% - 0.1em);
        }
        .streaming-logos span {
            font-size: 14px;
            display: block;
            height: 28px;
            line-height: 28px;
            position: relative;
        }
        .streaming-logos span::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0.05em;
            background-color: rgba(0, 191, 166, 0.95);
            transition: all 0.3s ease;
        }
        .streaming-logos a:hover span::after {
            width: calc(100% - 0.1em);
        }
        .playlist-embed {
            margin: 0 0 20px 0;
            max-width: 560px;
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        .playlist-embed iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .playlist-fallback {
            display: none;
            width: 100%;
            height: 100%;
        }
        .playlist-fallback img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 0;
        }
        .playlist-embed.fallback-visible iframe {
            display: none;
        }
        .playlist-embed.fallback-visible .playlist-fallback {
            display: block;
        }
    </style>
    <script>
        const i18n = {
            ru: {
                music: 'Музыка',
                guitarThings: 'Гитарные штуки',
                splash: 'ВСПЛЕСК',
            },
            en: {
                music: 'Music',
                guitarThings: 'Guitar Things',
                splash: 'SPLASH',
            }
        };

        function setLang(lang) {
            localStorage.setItem('lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = i18n[lang][el.dataset.i18n];
            });
            document.querySelectorAll('.lang-toggle button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        function showPlaylistFallback(container) {
            if (!container) return;
            container.classList.add('fallback-visible');
        }

        function onPlaylistIframeLoad(iframe) {
            const container = iframe.closest('.playlist-embed');
            if (!container) return;
            container.dataset.loaded = 'true';
            container.classList.remove('fallback-visible');
        }

        function onPlaylistIframeError(iframe) {
            showPlaylistFallback(iframe.closest('.playlist-embed'));
        }

        function initPlaylistFallbacks() {
            document.querySelectorAll('.playlist-embed iframe').forEach(iframe => {
                const container = iframe.closest('.playlist-embed');
                setTimeout(() => {
                    if (container && container.dataset.loaded !== 'true') {
                        showPlaylistFallback(container);
                    }
                }, 6000);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const saved = localStorage.getItem('lang');
            const browser = (navigator.language || navigator.userLanguage || 'ru').startsWith('ru') ? 'ru' : 'en';
            setLang(saved || browser);
            initPlaylistFallbacks();
        });
    </script>
</head>
<body>
    <div class="lang-toggle">
        <button data-lang="ru" onclick="setLang('ru')">ru</button>
        <button data-lang="en" onclick="setLang('en')">en</button>
    </div>
    <section>
        <a href="https://www.dipnaked.com/"><img src="./logo.png" alt="Dipnaked Logo"></a>
    </section>
    <section class="music-section">
        <h2><span data-i18n="music">Music</span></h2>
        <div class="streaming-logos">
            <a href="https://open.spotify.com/artist/5x1f95Qpvhruom1A7cyjxF" target="_blank" rel="noopener">
                <img src="/assets/icons/spotify.svg" alt="Spotify">
                <span>spotify</span>
            </a>
            <a href="https://music.apple.com/md/artist/dipnaked/1733917933" target="_blank" rel="noopener">
                <img src="/assets/icons/applemusic.svg" alt="Apple Music">
                <span>apple music</span>
            </a>
            <a href="https://music.youtube.com/channel/UCBxLx6ozyCb0p3L0XVZ1_3Q" target="_blank" rel="noopener">
                <img src="/assets/icons/ytmusic.png" alt="YouTube Music">
                <span>youtube music</span>
            </a>
            <a href="https://music.yandex.ru/artist/22069421" target="_blank" rel="noopener">
                <img src="/assets/icons/yandexmusic.png" alt="Yandex Music">
                <span>yandex music</span>
            </a>
            <a href="https://vk.com/artist/dipnaked" target="_blank" rel="noopener">
                <img src="/assets/icons/vk.svg" alt="VK Music">
                <span>vk music</span>
            </a>
            <a href="https://music.amazon.com/artists/B0CXN1TXQV/dipnaked" target="_blank" rel="noopener">
                <img src="/assets/icons/amazonmusic.png" alt="Amazon Music">
                <span>amazon music</span>
            </a>
            <a href="https://www.deezer.com/us/artist/258018432" target="_blank" rel="noopener">
                <img src="/assets/icons/deezer.png" alt="Deezer">
                <span>deezer</span>
            </a>
            <a href="https://tidal.com/artist/46288640" target="_blank" rel="noopener">
                <img src="/assets/icons/tidal.png" alt="Tidal">
                <span>tidal</span>
            </a>
            <a href="https://soundcloud.com/dipnaked-music" target="_blank" rel="noopener">
                <img src="/assets/icons/soundcloud.png" alt="SoundCloud">
                <span>soundcloud</span>
            </a>
        </div>
    </section>
    <section class="guitar-section">
        <h2><span data-i18n="guitarThings">Guitar Things</span></h2>
        <div class="playlist-embed">
            <iframe
                src="https://www.youtube.com/embed/videoseries?list=PLOJDfHvUUm2My1UriU9naaXOeSECEFQXk"
                title="Guitar Things playlist"
                loading="lazy"
                onload="onPlaylistIframeLoad(this)"
                onerror="onPlaylistIframeError(this)"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
            <a
                class="playlist-fallback"
                href="https://www.youtube.com/playlist?list=PLOJDfHvUUm2My1UriU9naaXOeSECEFQXk"
                target="_blank"
                rel="noopener"
                aria-label="Guitar Things playlist fallback">
                <img src="https://i.ytimg.com/vi_webp/videoseries/maxresdefault.jpg?list=PLOJDfHvUUm2My1UriU9naaXOeSECEFQXk" alt="Guitar Things playlist cover">
            </a>
        </div>
    </section>
    <section class="splash-section">
        <h2><span data-i18n="splash">SPLASH</span></h2>
        <div class="playlist-embed">
            <iframe
                src="https://www.youtube.com/embed/videoseries?list=PLOJDfHvUUm2POot4GpgXhPL3tiAQYiHeD"
                title="SPLASH playlist"
                loading="lazy"
                onload="onPlaylistIframeLoad(this)"
                onerror="onPlaylistIframeError(this)"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
            <a
                class="playlist-fallback"
                href="https://www.youtube.com/playlist?list=PLOJDfHvUUm2POot4GpgXhPL3tiAQYiHeD"
                target="_blank"
                rel="noopener"
                aria-label="SPLASH playlist fallback">
                <img src="https://i.ytimg.com/vi_webp/videoseries/maxresdefault.jpg?list=PLOJDfHvUUm2POot4GpgXhPL3tiAQYiHeD" alt="SPLASH playlist cover">
            </a>
        </div>
    </section>
</body>
</html>
