<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dipnaked</title>
    
    <!-- Satoshi font from Fontshare CDN -->
    <link 
        rel="stylesheet" 
        href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap"
    />
    
    <style>
        /* CSS Reset */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }
        
        img {
            display: block;
            max-width: 100%;
        }
        
        /* Main layout */
        body {
            background-color: #000000;
            color: #cccccc;
            font-family: "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 12px;
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Center block grows vertically, stays centered */
        .center-block {
            display: flex;
            flex-direction: column;
            align-items: center; /* logo and text-block share the same center axis */   
        }
        
        /* Logo */
        .logo {
            width: 150px;
        }
        
        /* Text block: width shrinks to brand-name, so it centers under the logo. */
        .text-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* every line aligns to brand-name's left edge */
            gap: 16px;
            width: fit-content;
        }
        
        /* Brand name (lettering) — defines the block width, centered under the logo */
        .brand-name {
            letter-spacing: 0.9ch;
            margin-top: 24px;
        }
        
        /* Tagline and links don't widen the block; they overflow to the right
           while their left edge stays aligned with brand-name. */
        .tagline {
            width: 0;
            white-space: nowrap;
            /* font-size: 12px;
            font-weight: 400; */
            letter-spacing: 0.5ch;
            font-style: italic;
            margin-top: 24px;
        }
        
        /* Links stacked vertically */
        .links {
            display: flex;
            flex-direction: column;
            width: 0;
            white-space: nowrap;
            gap: 12px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1ch;
            margin-top: 24px;
        }
        
        .links a {
            color: #cccccc;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }
        
        .links a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="center-block">
        <img src="logo.png" alt="dipnaked" class="logo" />
        
        <div class="text-block">
            <div class="brand-name">dipnaked</div>
            
            <div class="tagline">if affair with the abbys</div>
            
            <div class="links">
                <a href="/releases/august/">listen</a>
                <a href="#watch">watch</a>
                <a href="#look">look</a>
            </div>
        </div>
    </div>
</body>
</html>
